<script>
  function showError(title, detail) {
    var r = document.getElementById('root');
    if (!r) return;
    r.innerHTML =
      '<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:system-ui,sans-serif;background:#F8FAFC;padding:24px">' +
      '<div style="text-align:center;max-width:480px">' +
      '<div style="font-size:40px;font-weight:900;color:#E30613;margin-bottom:12px">Y</div>' +
      '<h2 style="margin:0 0 8px;color:#0F172A">'+title+'</h2>' +
      '<p style="color:#64748B;margin:0 0 8px;font-size:13px;line-height:1.6">'+detail+'</p>' +
      '<p style="color:#94A3B8;margin:0 0 20px;font-size:12px">Detalles técnicos: '+
        (typeof React==='undefined'?'React no cargó. ':'React OK. ')+
        (typeof ReactDOM==='undefined'?'ReactDOM no cargó. ':'ReactDOM OK. ')+
        (typeof Babel==='undefined'?'Babel no cargó.':'Babel OK.')+
      '</p>' +
      '<div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">' +
      '<button onclick="window.location.reload()" style="padding:10px 18px;background:#E30613;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer">Recargar</button>' +
      '<button onclick="localStorage.clear();window.location.reload()" style="padding:10px 18px;background:#fff;color:#DC2626;border:1px solid #FECACA;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer">Limpiar datos y recargar</button>' +
      '</div></div></div>';
  }
  window.addEventListener('error', function(e) {
    if (e.target && e.target.tagName === 'SCRIPT') {
      showError('Error al cargar la aplicación', 'No se pudo cargar una librería necesaria. Verifica tu conexión a internet y recarga la página.');
    }
  }, true);
  window.__appMounted = false;
  setTimeout(function() {
    if (!window.__appMounted) {
      showError(
        'La aplicación tardó demasiado en cargar',
        'Puede ser un problema de conexión lenta o un error interno. Verifica que tienes internet y recarga.'
      );
    }
  }, 20000);
</script>
